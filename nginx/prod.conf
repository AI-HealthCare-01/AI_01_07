# nginx/prod.conf

# upstream: Nginx가 요청을 전달할 백엔드 서버 그룹 정의
# Docker Compose 환경에서는 서비스 이름이 내부 DNS로 사용됨
# 즉 "fastapi" 라는 컨테이너의 8000 포트로 요청을 전달하게 됨
upstream fastapi {
    server fastapi:8000;
}

# 외부 클라이언트의 HTTP 요청을 수신할 서버 설정
server {
    # 해당 서버 블록이 처리할 도메인 또는 IP
    # 실제 운영 환경에서는 도메인을 넣는 것이 일반적
    # 예: api.example.com
    server_name 54.116.94.224;

    # Nginx가 HTTP 요청을 수신할 포트
    # 80번은 기본 HTTP 포트
    # 추후에 https 설정을 위해 SSL 인증서를 발급받은 후 443 포트를 추가할 수 있습니다.
    listen 80;

    # Let's Encrypt 인증서 발급/갱신을 위해 사용하는 경로
    # certbot이 HTTP challenge 파일을 생성하면
    # 이 경로에서 해당 파일을 제공하게 됨
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # /api/ 로 시작하는 요청만 FastAPI 서버로 전달
    # 예:
    # /api/users
    # /api/login
    # /api/items/1
    location /api/ {
        # reverse proxy 설정
        # 클라이언트 요청을 upstream으로 전달
        # 여기서는 fastapi 컨테이너로 전달됨
        proxy_pass http://fastapi;

        # 원본 요청의 Host 헤더 전달
        # 백엔드에서 도메인 기반 로직이 있을 경우 필요
        proxy_set_header Host $host;

        # 실제 클라이언트 IP 전달
        # 백엔드 로그 또는 보안 로직에서 사용
        proxy_set_header X-Real-IP $remote_addr;

        # 프록시 체인을 고려한 클라이언트 IP 정보
        # 여러 프록시를 거칠 경우 IP가 누적됨
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 클라이언트가 HTTP / HTTPS 중 어떤 프로토콜로 접속했는지 전달
        # 백엔드에서 redirect 처리 등에 사용
        proxy_set_header X-Forwarded-Proto $scheme;

        # 응답 버퍼링 비활성화
        # 스트리밍 응답(SSE, WebSocket, AI inference 등)에서 지연 방지
        proxy_buffering off;
    }

    # /api/ 이외의 모든 요청 차단을 위해 404 Not Found 상태코드로 응답을 반환
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
