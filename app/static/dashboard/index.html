<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="./styles.css"/>
  <title>Diabetes Dashboard</title>
</head>
<body>
  <div class="wrap">
    <h1>대시보드</h1>

    <div class="cards">
      <div class="card" id="riskCard">
        <h2>경계선 위험도</h2>
        <div class="big" id="riskLevel">-</div>
        <div class="sub" id="riskProb">-</div>
        <div class="chips" id="riskFactors"></div>
      </div>

      <div class="card" id="calCard">
        <h2>오늘 칼로리</h2>
        <div class="big" id="kcalToday">-</div>
        <div class="sub" id="kcalGoal">-</div>
      </div>

      <div class="card" id="trendCard">
        <h2>최근 7일 추이</h2>
        <pre id="trendText">-</pre>
      </div>
    </div>
  </div>

  <script src="./dashboard.js"></script>
</body>
</html>
