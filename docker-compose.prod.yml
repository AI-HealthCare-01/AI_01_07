# 도커로 구동해야할 서비스를 정의합니다. 각 서비스는 각각의 컨테이너로 구동됩니다.
services:
  # 1. Redis (메시지 브로커 및 캐싱)
  redis:
    # 해당 서비스 컨테이너 구동시 사용할 이미지
    # 이미지 이름은 이미지이름:태그 형태로 구성됩니다.
    # 여러분의 이미지 이름은 유저네임/레포지토리이름:태그 형태입니다.
    image: redis:alpine  
    container_name: redis # 컨테이너의 이름
    networks:  # 도커 네트워크 연결 설정
      - ws
    ports:  # 포트 포워딩 설정
      - "${REDIS_PORT}:6379"
    healthcheck:  # 해당 컨테이너가 정상적으로 실행되는지 확인하는 헬스체크
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 2. Database
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
    # ${환경변수명} 문법은 OS 환경변수 혹은 .env에서 해당 환경변수명과 일치하는 항목이 있으면 대입합니다.
    # 반드시 사전에 .env에 해당 항목이 존재하는지 확인해야 합니다.
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - ${DB_EXPOSE_PORT}:${DB_PORT}
    networks:
      - ws
    volumes:
      - mysql_data:/var/lib/mysql  # 컨테이너가 삭제돼도 데이터는 호스트 파일시스템에 남음
    command: # 한글 저장을 위한 문자셋 설정 (필수!)
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --port=${DB_PORT}
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. API Server (FastAPI)
  fastapi:
    container_name: fastapi
    build:
      context: .  # 프로젝트 루트를 빌드 컨텍스트로 지정
      dockerfile: app/Dockerfile  # Dockerfile 위치 지정
      platforms:
        - linux/amd64
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}  # APP_VERSION은 빌드된 이미지의 버전관리를 위함입니다. v1.0.0 형식으로 사용합니다.
    env_file: .env
    environment:
      DB_HOST: mysql
      AI_WORKER_URL: http://ai-worker:9000
    # 바인딩할 볼륨을 설정합니다.
    volumes:
      - ./envs:/app/envs:ro
      - static_volume:/app/templates
    # 컨테이너 종료 시 재시작 옵션입니다.
    restart: always
    ports:
      - "8000:8000"
    networks:
      - ws
    # 의존성 옵션입니다. mysql, redis 컨테이너가 정상 실행되었을 때만 이 컨테이너를 실행합니다.
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. AI Worker (Model 학습 및 추론)
  ai-worker:
    container_name: ai-worker
    build:
      context: .  # 프로젝트 루트를 빌드 컨텍스트로 지정
      dockerfile: ai_worker/Dockerfile  # Dockerfile 위치 지정
      platforms:
        - linux/amd64
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}  # AI_WORKER_VERSION은 빌드된 이미지의 버전관리를 위함입니다. V1.0.0 형식으로 사용합니다.
    env_file: .env
    environment:
      DB_HOST: mysql
    volumes:
      - ./artifacts:/app/artifacts:ro
    restart: always
    mem_limit: 4G
    ports:
      - "9000:9000"
    networks:
      - ws
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 5. Nginx (웹 서버 - 요청 리버스 프록시로 전달)
  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /var/www/html:/usr/share/nginx/html
      - static_volume:/vol/web/static
      - certbot-conf:/etc/letsencrypt  # 추가
      - certbot-www:/var/www/certbot   # 추가
    ports:
      - "80:80"
      - "443:443"  # 추가
    networks:
      - ws
    depends_on:
      - fastapi
 # 6. certbot: SSL 인증서 발급담당 (추가된 부분)
  certbot:
    image: certbot/certbot
    container_name: auto-certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 48h & wait $${!}; done;'"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - nginx

volumes:
  mysql_data:
    name: mysql_data
  static_volume:
    name: static_volume
  media_volume:
    name: media_volume
  # (추가된 부분)
  certbot-conf:
    name: certbot-conf
  # (추가된 부분)
  certbot-www:
    name: certbot-www

networks:
  ws:
    driver: bridge
